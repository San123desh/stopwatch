<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch & Focus Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="scanlines"></div>
    <div id="app">

        <main class="container">
            <!-- Left Panel: Stopwatch -->
            <section class="stopwatch-section">
                <div class="timer-display" id="timer">00:00:00:00</div>
                <div class="controls">
                    <p class="instruction">Press Spacebar to Start/Stop</p>
                    <button id="reset-btn" class="secondary-btn">Reset Session</button>
                    <button id="fullscreen-btn" class="icon-btn" title="Fullscreen">⛶</button>
                </div>
            </section>

            <!-- Right Panel: 365 Tracker -->
            <section class="tracker-section">
                <div class="tracker-header">
                    <h2>Tracker</h2>
                    <div id="user-controls">
                        <!-- Injected by JS -->
                    </div>
                </div>
                <div class="grid-container" id="tracker-grid">
                    <!-- Grid items injected by JS -->
                </div>
            </section>
        </main>

    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
